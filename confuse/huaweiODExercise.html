    let pointList = []
    polygonList.forEach((line) => {
        let pList = line.split(' ')
        for (let i = 0; i < pList.length; i += 2) {
            pointList.push([Number(pList[i]), Number(pList[i + 1])])
        }
    })
    // 找到最小的点
    let minPoint = []
    let t = []
    pointList.find
    pointList.sort((a, b) => {
        let d = a[0] - b[0]
        if (d === 0) {
            return a[1] - b[1]
        } else {
            return d
        }
    })
    minPoint = pointList[0]
    // 再找逆时针方向的向量
    // 计算三个点的位置
    let calcPosition = (a, b, o) => {
        let d = (o[0] - a[0]) * (o[1] - b[1]) - (o[0] - b[0]) * (o[1] - a[1])
        let s = Math.sign(d)
        return s
    }
    let unorderRes = [minPoint]
    // let tag = [minPoint[0] + minPoint[1]]
    let tag = [minPoint[0] * pointList.length + minPoint[1]]
    for (let i = 0; i < pointList.length - 1; i++) {
        let j = i + 1
        let a = 0
        while (a < pointList.length) {
            if (pointList.every(p => {
                if (
                    (p[0] === pointList[i][0] && p[1] === pointList[i][1])
                    || (p[0] === pointList[j % pointList.length][0] && p[1] === pointList[j % pointList.length][1])
                ) {
                    return true
                } else {
                    return calcPosition(pointList[i], pointList[j % pointList.length], p) < 0
                }
            })) {
                let k = j % pointList.length
                let t = pointList[k][0] * pointList.length + pointList[k][1]
                if (tag.includes(t)) {
                    tag.push(pointList[i][0] * pointList.length + pointList[i][1])
                    unorderRes.push(pointList[i])
                } else {
                    tag.push(t)
                    unorderRes.push(pointList[k])
                }
            }
            j++
            a++
        }

    }
    // 排序
    let res = []
    let tArr = unorderRes.sort((a, b) => {
        return a[0] - b[0]
    })
    tArr.forEach(item => {
        if (item[1] <= item[0]) {
            res.push(item)
        }
    })
    tArr.reverse().forEach(item => {
        if (item[1] > item[0]) {
            res.push(item)
        }
    })
    return res
}

f = (str) => {
    // let reg = /[+-*\/\(\)\[\]\{\}]/g
    // let reg = /[\+\-\*\/]/g
    // let reg = /[\+-]/g
    let reg = /[\+\-\*\/\(\)\[\]\{\}]/g
    let numberList = str.split(reg).filter(item => item).map(item => parseInt(item))
    let signList = str.match(reg).map(item => {
        let r = item
        switch (item ) {
            case '[':
            case '{':
                r = '('
                break;
            case ']':
            case '}':
                r = ')'
                break;
        }
        return r
    })

    // 栈
    let numberStack = []
    let signStack = []
    let j = 0
    for (let i = 0; i < numberList.length; i++) {
        numberStack.push(numberList[i])
        switch (signList[j]) {
            case '(':
                signStack.push(signList[j])
                j++
                break;
            case ')':
                numberStack.pop()
                break;
        }
    }
    let res = 0
    return res
}

f = (range, count, data) => {
    let first = data[0]
    // 处理数据边界
    let startIndex
    if (range[0] < first[0]) {
        startIndex = 0
    } else {
        startIndex = data.findIndex(item => {
            return (item[0] <= range[0] && range[0] <= item[1])
        })
    }
    let endIndex
    if (data[data.length - 1][1] < range[1]) {
        endIndex = data.length - 1
    } else {
        endIndex = data.findIndex(item => {
            return (item[0] <= range[1] && range[1] <= item[1])
        })
    }
    let resArr = []
    for (let i = startIndex; i <= endIndex; i++) {
        if (i === startIndex) {
            let t = Math.max(data[i][0], range[0])
            let n = data[i][1] - t + 1
            let j = 0;
            while (j < n) {
                resArr.push([t, data[i][2]])
                t++
                j++
            }
        } else if (i === endIndex) {
            let end = Math.min(data[i][1], range[1])
            let n = end - data[i][0] + 1
            let j = 0
            let t = data[i][0]
            while (j < n) {
                resArr.push([t, data[i][2]])
                t++
                j++
            }
        } else {
            let n = data[i][1] - data[i][0] + 1
            let j = 0
            let t = data[i][0]
            while (j < n) {
                resArr.push([t, data[i][2]])
                t++
                j++
            }
        }
    }
    let res = resArr.reduce((r, c) => {
        // c: [ms, kpi]
        r += `${c[0]},${c[1]}\n`
        return r
    }, '')
    return res
}

f = (arr, k) => {
    let tArr = [...arr]
    tArr.sort((a, b) => a - b)
    let middle
    if (tArr.length % 2) {
        let mIndex = Math.floor(tArr.length / 2)
        middle = tArr[mIndex]
    } else {
        let t = tArr.length / 2
        middle = (tArr[t] + tArr[t - 1]) / 2
    }
    let res
    let dMin = Number.MAX_SAFE_INTEGER
    for (let i = 0; i <= arr.length - k; i++) {
        let dt = Math.abs(sum(arr.slice(i, i + k)) - middle)
        if (dt <= dMin) {
            dMin = dt
            res = i
        }
    }
    return res
}

let hufmanTree = (arr) => {
    let createNode = (v) => {
        return {
            left: null,
            value: v,
            right: null,
        }
    }
    let merge = (nodeA, nodeB) => {
        return {
            left: nodeA, 
            value: nodeA.value + nodeB.value,
            right: nodeB,
        }
    }
    arr = arr.map(item => {
        return createNode(item)
    })
    let res = null
    while (arr.length > 1) {
        arr.sort((a, b) => a.value - b.value)
        let nodeA = arr.shift()
        let nodeB = arr.shift()
        let nodeC = merge(nodeA, nodeB)
        arr.push(nodeC)
    }
    res = arr[0]
    return res
}

f = (arr) => {
    let createTree = (arr) => {
        let createNode = (v) => ({
            left: null,
            value: v,
            right: null,
            height: 0,
        })
        let merge = (nodeA, nodeB) => {
            let left
            let right
            if (nodeA.height <= nodeB.height) {
                left = nodeA
                right = nodeB
            } else {
                left = nodeB
                right = nodeA
            }
            return {
                left,
                right,
                value: nodeA.value + nodeB.value,
                height: Math.max(nodeA.height, nodeB.height) + 1,
            }
        }
        arr = arr.map(item => (createNode(item)))
        let tree
        while (arr.length > 1) {
            arr.sort((a, b) => {
                let vp = a.value - b.value
                if (vp) {
                    return vp
                } else {
                    return a.height - b.height
                }
            })
            let nodeSmall = arr.shift()
            let nodeBig = arr.shift()
            let nodeNew = merge(nodeSmall, nodeBig)
            arr.unshift(nodeNew)
        }
        tree = arr[0]
        return tree
    }
    let root = createTree([...arr])
    // 遍历
    let fn = (node, opFn) => {
        if (node) {
            fn(node.left, opFn)
            opFn(node.value)
            fn(node.right, opFn)
        }
    }
    fn(root, clog)
}

f = (goal, arr) => {
    let unAct = [] // 不能到达且小于goal
    let act = [] // 可以到达
    // 全排列
    let tRes = []
    let allOrder = (choices, state) => {
        if (state.length === choices.length) {
            tRes.push([...state])
        } else {
            choices.forEach(item => {
                if (!state.includes(item)) {
                    state.push(item)
                    allOrder(choices, state)
                    state.pop()
                }
            })
        }
    }
    let curPosition = (arr) => {
        return arr.reduce((r, c, i) => {
            let t = i % 2 ? -c : c
            return r += t
        }, 0)
    }
    allOrder(arr, [])
    tRes.forEach((orderArr) => {
        let t = curPosition(orderArr)
        switch (Math.sign(t - goal)) {
            case 0:
                act.push([...orderArr])
                break;
            case 1:
                break;
            case -1:
                unAct.push([...orderArr])
                break;
        }
    })
    
    if (act.length) {
        // act排序
        act.sort((a, b) => {
            let res = 0
            for (let i = 0; i < a.length; i++) {
                let t = b[i] - a[i]
                if (t) {
                    res = t    
                    break;
                }
            }
            return res
        })
        res = act[0].join(' ')
    } else {

        // str com x
        return str.split(' ')
    })
    let p = 0
    let tStr = ''
    let tP = p
    for (let i = 0; i < commandArr.length; i++) {
        let c = commandArr[i]
        switch (commandArr[i][0]) {
            case 'FORWARD':
                p += Number(c[1])
                p = Math.min(p, res.length)
                break;
            case 'BACKWARD':
                p -= Number(c[1])
                p = Math.max(0, p)
                break;
            case 'SEARCH-FORWARD':
                tP = res.slice(0, p).includes(c[1])
                if (tP !== -1) {
                    p = tP
                }
                break;
            case 'SEARCH-BACKWARD':
                tP = res.slice(p).indexOf(c[1])
                if (tP !== -1) {
                    p = p + tP
                }
                break;
            case 'INSERT':
                res = res.slice(0, p) + c[1] + res.slice(p)
                p += c[1].length
                break;
            case 'REPLACE':
                if (res.length >= p + c[1].length) {
                    res = res.slice(0, p) + c[1]
                } else {
                    res = res.slice(0, p) + c[1] + res.slice(p + c[1].length)
                }
                break;
            case 'DELETE':
                res = res.slice(0, p) + res.slice(p + Number(c[1]))
                break;
        }
    }
    return res
}

f = (m, arr) => {
    if (m < 0
        || m > 10
        || arr.length <= 0
        || 100 < arr.length
    ) {
        return [[]]
    }
    arr = arr.map(subArr => {
        subArr = [...new Set(subArr)]
        // subArr = 
        subArr.sort((a, b) => a - b)
        return subArr
    })
    let intersection = (a, b) => {
        let t = a.filter(item => b.includes(item))
        // clog(t)
        return t
    }
    let union = (a, b) => {
        return [...new Set([...a, ...b])]
    }
    let check = () => {
        for (let i = 0; i < arr.length - 1; i++) {
            for (let j = i + 1; j < arr.length; j++) {
                if (intersection(arr[i], arr[j]).length >= 2) {
                    return [i, j]
                }
            }
        }
        return []
    }
    let merge = (i, j) => {
        let min = Math.min(i, j)
        let max = Math.max(i, j)
        arr[min] = union(arr[min], arr[max]).sort((a, b) => a - b)
        arr.splice(max, 1)
    }
    let flag = check()
    while (flag.length) {
        merge(flag[0], flag[1])
        flag = check()
    }
    return arr
}

f = (str) => {
    let reg = /[a-zA-Z]/
    let arr = str.split('').filter((item) => {
        if (reg.test(item)) {
            return true
        } else {
            return false
        }
    }).map(item => item.toLowerCase())
    // let 
    let i = 0
    let j = 1
    let res = []
    while (i < arr.length) {
        j = i + 1
        let count = 0
        while (arr[i] === arr[j]) {
            count++
            j++
        }
        if (count) {
            res.push([arr[i], j - i])
            i = j
        } else {
            while (j < arr.length) {
                if (arr[j] === arr[i]) {
                    count++
                }
                j++
            }
            res.push([arr[i], count])
            i++
        }
    }
    res.sort((a, b) => {
        let t = b[1] - a[1]
        if (t) {
            return t
        } else {
            return a[0].charCodeAt(0) - b[0].charCodeAt(0)
        }
    })
    return res.reduce((r, c) => {
        r += `${c[0]}${c[1]}`
        return r
    }, '')
}

f = (str) => {
    let arr = str.split(' ').sort((a, b) => {
        let t = b.length - a.length
        if (t) {
            return t
        } else {
            let len = Math.min(a.length, b.length)
            let i = 0
            while (i < len) {
                if (a.charCodeAt(i) !== b.charCodeAt(i)) {
                    break;
                }
                i++
            }
            if (i === len) {
                return b.length - a.length
            } else {
                return b.charCodeAt(i) - a.charCodeAt(i)
            }
        }
    })
    let res = []
    let isExist = (i) => {
        let j = arr[i].length - 1
        while (j >= 1) {
            if (!arr.includes(arr[i].slice(0, j))) {
                return false
            }
            j--
        }
        return true
    }
    let i = 0
    while (i < arr.length) {
        if (isExist(i)) {
            res.push(arr[i])
            break;
        }
        i++
    }
    if (res.length) {
        return res[0]
    } else {
        return ''
    }
}

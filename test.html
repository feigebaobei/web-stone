f = (map, k) => {
    let stepCount = 0
    let start = [0, 0]
    let end = [map.length - 1, map[0].length - 1]
    let queen = [[...start]]
    let tag = Array.from({length: map.length}, () => Array.from({length: map[0].length}, () => 0))

    }

            && tag[r][c] === 0
        ) {

            tag[r][c] = 1

            && tag[r][c] === 0
        ) {
            state.push([r, c])
            && tag[r][c] === 0
        }
        r = i
        c = j + 1
        if (c < map[0].length
            && (map[i][j] === 1 ? map[r][c] === 0 : true)
            && tag[r][c] === 0
        ) {
            state.push([r, c])

        }
        return state
    }
    while (queen.length) {

                queen.push(...getNeighbour(point))
            }
            stepCount++
        }
    }

        class Queue {
            constructor(priority) {
                this._arr = []
                this.priority = priority
            }
            enqueue(o) {
                switch (this._arr.length) {
                    case 0:
                        this._arr.push(o)
                        break;
                    default:
                        let index = this._arr.findIndex(item => item[this.priority] < o[this.priority])
                        if (index > -1) {
                            this._arr.splice(index, 0, o)
                        } else {
                            this._arr.push(o)
                        }
                        break;
                }
            }
            dequeue() {
                return this._arr.shift()
            }

                            }

                        } else {
                            dp[k].push(...Array.from({length: arr[k][0]}, () => 0))

f = (i, d) => {
    // 创建一棵树。
    // 节点：{
    //     left: node,
    //     value: {
    //         count: number,
    //         toggle: boolean, // true 开 false 关
    //     },
    //     right: node,
    // }
    let createNode = (v) => {
        return {
            left: null,
            value: v,
            right: null,
        }
    }
    class Tree {
        constructor() {
            this.root = null
        }
        mount(node, v1, v2) {
            node.left = v1
            node.right = v2
        }
    }
    let tree = new Tree()
    let nodeCount = 0
    for (let j = 0; j < d; j++) {
        nodeCount += Math.pow(2, j)
    }
    tree.root = createNode({
        count: 1,
        toggle: false,
    })
    let tArr = [tree.root] // 要挂载子节点的数组
    let cur = 1
    while (cur < nodeCount) {
        let node = tArr.shift()
        let leftNode = createNode({
            count: ++cur,
            toggle: false,
        })
        let rightNode = createNode({
            count: ++cur,
            toggle: false,
        })
        tArr.push(leftNode)
        tArr.push(rightNode)
        tree.mount(node, leftNode, rightNode)
    }
    // 放球
    let _f = (node, n) => {
        if (!node) {
            return n
        } else {
            if (node.value.toggle) { // 如果该结点上的开关关闭,则往左走,否则往右走
                node.value.toggle = !node.value.toggle
                return _f(node.right, node.value.count)
            } else {
                node.value.toggle = !node.value.toggle
                return _f(node.left, node.value.count)
            }
        }
    }
    let dp = []
    for (let j = 0; j < i; j++) {
        dp.push(_f(tree.root))
    }
    return dp
}

    let res = arr.map(item => {
        // item - min
        if (item <= min) {
            return 0
        } else {
            return item - min
        }
    })
    while (max - min > 1) {
        let cap = Math.floor((max + min) / 2)
        let remain = total
        let tArr = arr.map(item => {
            let t = cap < item ? item - cap : 0
            remain -= t
            return t
        })
        if (remain > sum) {
            max = cap
        } else if (remain < sum) {
            min = cap
            res = tArr
        } else {
            res = tArr
            break;
        }
    }
    return res
}

        let sa = parseInt(a, 10).toString(2)
        let sb = parseInt(b, 10).toString(2)

        sa = sa.padStart(max, '0')
        sb = sb.padStart(max, '0')
        let res = ''
        for (let i = 0; i < max; i++) {
            if (sa[i] !== sb[i]) {
                res += '1'
            } else {
                res += '0'
            }
        }
        return res
    }
    let getSimular = (a, b) => {
        let sa = parseInt(a, 10).toString(2)
        let sb = parseInt(b, 10).toString(2)
        let max = Math.max(a.length, b.length)
        sa = sa.padStart(max, '0')
        sb = sb.padStart(max, '0')
        let res = ''
        for (let i = 0; i < max; i++ ) {
            if (sa[i] === '1' && sb[i] === '1') {
                res += '1'
            } else {
                res += '0'
            }
        }
        return res
    }
    for (let i = 0; i < arr.length - 1; i++) {
        for (let j = i + 1; j < arr.length; j++) {
            let diffValue = getDiff(arr[i], arr[j])

            }

        let arr = str.split(' ')
        let t = []
        for (let i = 0; i <arr.length; i += 2) {
            t.push([arr[i], arr[i + 1]])
        }
        return t
    }).flat(1)
    let borderPointSet = new Set()
    pointList.sort((a, b) => a[0] - b[0])
    // clog(pointList)
    let cross = (p0, p1, p2) => {
        let [[x1, y1], [x2, y2], [x0, y0]] = [p0, p1, p2]
        return (x1 - x0) * (y2 - y0) - (y1 - y0) * (x2 - x0)
    }
    for (let i = 0; i < pointList.length - 1; i++) {
        let k = 0
        let j = i + 1
        while (k < pointList.length) {
            j = (j + pointList.length) % pointList.length
            let p0 = pointList[i]
            let p1 = pointList[j]
            if (pointList.every((p, index) => {
                if ([i, j].includes(index)) {
                    return true
                } else {
                    return cross(p0, p1, p) > 0
                }
            })) {
                borderPointSet.add(`${p0[0]},${p0[1]}`)
                borderPointSet.add(`${p1[0]},${p1[1]}`)
            }
            k++
            j++
        }
    }
    // clog(borderPointSet)
    let res = []
    Array.from([...borderPointSet]).forEach(item => {
        res.push(item.split(',').map(item => Number(item)))
    })
    // clog(res)
    res.sort((a, b) => {
        let t = a[0] - b[0]
        if (t) {
            return t
        } else {
            return a[1] - b[1]
        }
    })
    let leftBottom = res[0]
    let resStr = ''
    for (let i = 0; i < res.length; i++) {
        if (leftBottom[0] + res[i][0] >= leftBottom[1] + res[i][1]) {
            // clog(res[i][0])
            resStr += `${res[i][0]} ${res[i][1]} `
        }
    }
    for (let i = res.length - 1; i >= 0; i--) {
        if (leftBottom[0] + res[i][0] < leftBottom[1] + res[i][1]) {
            resStr += `${res[i][0]} ${res[i][1]} `
        }
    }
    clog(resStr.slice(0, -1))
}
